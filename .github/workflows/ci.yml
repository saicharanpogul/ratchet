name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - name: cargo test (default features)
        run: cargo test --workspace --all-targets
      - name: cargo test (solana-ratchet-svm litesvm feature)
        # Validates the feature-gated path compiles and its tests pass.
        # Kept scoped to ratchet-svm + ratchet-cli so the Solana runtime
        # crates don't slow every other job.
        run: |
          cargo test -p solana-ratchet-svm --features litesvm
          cargo build -p solana-ratchet-cli --features litesvm-deploy

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          key: doc
      - name: cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  wasm:
    # Builds the ratchet-wasm crate for wasm32-unknown-unknown via
    # wasm-pack, runs wasm-bindgen-test under Node, then exercises the
    # Vitest integration suite that imports the compiled output the way
    # a real web build does.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Cargo check (no-default-features, wasm32)
        # Catches the "someone reintroduced a non-wasm dep into
        # ratchet-anchor's default path" failure mode before wasm-pack
        # even starts.
        run: cargo check -p solana-ratchet-anchor --no-default-features --target wasm32-unknown-unknown
      - name: wasm-bindgen-test (node)
        run: wasm-pack test --node crates/ratchet-wasm
      - name: Web — install, typecheck, test, build
        working-directory: web
        env:
          # npm install can set off postinstall scripts that check for
          # ratchet on PATH and fail on CI. Skip any lifecycle scripts
          # we don't explicitly need.
          npm_config_fund: "false"
          npm_config_audit: "false"
        run: |
          npm ci --no-audit --no-fund
          npm run typecheck
          npm run test
          npm run build
