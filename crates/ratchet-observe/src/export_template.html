<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ratchet observe — {{PROGRAM_NAME}}</title>
  <style>
    :root {
      --bg:        #0d0b12;
      --bg-soft:   #16131d;
      --border:    #2a2432;
      --border-strong: #3a3142;
      --fg:        #e7e3ef;
      --muted:     #9891a3;
      --dim:       #6a6272;
      --purple:    #9945ff;
      --green:     #14f195;
      --red:       #ff5468;
      --amber:     #ffc14c;
      --mono:      ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
    }
    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
      margin: 0; padding: 0;
    }
    main { max-width: 1000px; margin: 0 auto; padding: 48px 24px 96px; }
    header { margin-bottom: 32px; }
    h1 {
      font-size: 2rem; font-weight: 600; letter-spacing: -0.02em;
      margin: 0 0 4px;
    }
    h1 .name { color: var(--purple); }
    h2 {
      font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--dim); margin: 40px 0 12px;
      border-top: 1px solid var(--border); padding-top: 32px;
    }
    .meta {
      font-family: var(--mono); font-size: 0.85rem;
      color: var(--muted); line-height: 1.7;
    }
    .meta b { color: var(--fg); font-weight: 500; }
    table {
      width: 100%; border-collapse: collapse;
      font-family: var(--mono); font-size: 0.85rem;
    }
    th, td {
      text-align: left; padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    th {
      color: var(--dim); font-weight: 500;
      text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.08em;
    }
    td.num { text-align: right; }
    .ok { color: var(--green); }
    .warn { color: var(--amber); }
    .bad { color: var(--red); }
    .chip {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-family: var(--mono); font-size: 0.72rem;
      border: 1px solid var(--border-strong); color: var(--muted);
      margin-right: 6px;
    }
    .chip.ok { color: var(--green); border-color: color-mix(in oklch, var(--green) 30%, transparent); }
    .chip.bad { color: var(--red); border-color: color-mix(in oklch, var(--red) 30%, transparent); }
    .bar {
      background: linear-gradient(to right, var(--purple), transparent);
      height: 6px; border-radius: 3px;
      margin-top: 6px;
    }
    .card {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .card .row {
      display: flex; justify-content: space-between; gap: 24px;
      flex-wrap: wrap; align-items: baseline;
    }
    .card .row .err {
      font-family: var(--mono); color: var(--red);
      font-size: 0.85rem;
    }
    .card .row .ix {
      font-family: var(--mono); font-size: 0.85rem; color: var(--muted);
    }
    .card .meta-sub {
      font-family: var(--mono); color: var(--dim); font-size: 0.78rem;
      margin-top: 6px; word-break: break-all;
    }
    footer {
      margin-top: 96px; padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--dim); font-size: 0.78rem; text-align: center;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
<main>
  <header>
    <h1>ratchet observe — <span class="name" id="program_name">…</span></h1>
    <div class="meta" id="meta"></div>
  </header>

  <section>
    <h2>Instructions</h2>
    <table>
      <thead>
        <tr>
          <th>ix</th>
          <th class="num">count</th>
          <th class="num">✓ %</th>
          <th class="num">CU p50</th>
          <th class="num">CU p99</th>
          <th class="num">errors</th>
        </tr>
      </thead>
      <tbody id="instructions"></tbody>
    </table>
  </section>

  <section>
    <h2>Errors</h2>
    <div id="errors"></div>
  </section>

  <section>
    <h2>Recent failures</h2>
    <div id="failures"></div>
  </section>

  <section id="upgrade-section" style="display:none">
    <h2>Upgrade history</h2>
    <div class="card meta" id="upgrade"></div>
  </section>

  <section id="accounts-section" style="display:none">
    <h2>Accounts</h2>
    <table>
      <thead><tr><th>type</th><th class="num">count</th></tr></thead>
      <tbody id="accounts"></tbody>
    </table>
  </section>

  <footer>
    Generated by <a href="https://github.com/saicharanpogul/ratchet">ratchet observe</a> — data embedded inline.
  </footer>
</main>

<script id="report-json" type="application/json">{{REPORT_JSON}}</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById("report-json").textContent);

  const fmtWindow = (s) => s % 86400 === 0 ? `${s/86400}d`
    : s % 3600 === 0 ? `${s/3600}h`
    : s % 60 === 0 ? `${s/60}m` : `${s}s`;

  document.getElementById("program_name").textContent = data.program_name || "<unnamed>";
  document.getElementById("meta").innerHTML = `
    <b>PID:</b> ${data.program_id}<br>
    <b>window:</b> ${fmtWindow(data.window.seconds)}
     (${data.window.tx_count.toLocaleString()} transactions)
  `;

  // Instructions — largest count gets the longest bar.
  const maxCount = Math.max(1, ...data.instructions.map(ix => ix.count));
  const tbody = document.getElementById("instructions");
  for (const ix of data.instructions) {
    const successPct = ix.success_rate != null
      ? (ix.success_rate * 100).toFixed(1) + "%" : "—";
    const rateClass = ix.success_rate == null ? ""
      : ix.success_rate > 0.98 ? "ok"
      : ix.success_rate > 0.90 ? "warn" : "bad";
    const barWidth = (100 * ix.count / maxCount).toFixed(1);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <div>${ix.name}</div>
        <div class="bar" style="width: ${barWidth}%"></div>
      </td>
      <td class="num">${ix.count.toLocaleString()}</td>
      <td class="num ${rateClass}">${successPct}</td>
      <td class="num">${ix.cu_p50?.toLocaleString() ?? "—"}</td>
      <td class="num">${ix.cu_p99?.toLocaleString() ?? "—"}</td>
      <td class="num">${ix.error_count}</td>
    `;
    tbody.appendChild(tr);
  }

  // Errors — one card per bucket.
  const errHost = document.getElementById("errors");
  if (data.errors.length === 0) {
    errHost.innerHTML = `<div class="card meta">No errors in window.</div>`;
  } else {
    for (const e of data.errors) {
      const code = "0x" + e.code.toString(16).padStart(4, "0");
      const label = e.name ? `${e.name} (${code})` : code;
      const from = e.ix_names.length > 0 ? e.ix_names.join(", ") : "(unknown ix)";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="row">
          <div><span class="err">${label}</span>
            ${e.message ? `<div class="meta-sub">${e.message}</div>` : ""}
          </div>
          <div><span class="chip bad">${e.count}</span><span class="ix">from: ${from}</span></div>
        </div>
      `;
      errHost.appendChild(card);
    }
  }

  // Recent failures — decoded account input context.
  const failHost = document.getElementById("failures");
  if (data.recent_failures.length === 0) {
    failHost.innerHTML = `<div class="card meta">No failures to show.</div>`;
  } else {
    for (const f of data.recent_failures) {
      const ix = f.ix_name || "<unknown ix>";
      const code = f.error_code != null
        ? "0x" + f.error_code.toString(16).padStart(4, "0") : null;
      const errLabel = f.error_name ? `${f.error_name} (${code})`
        : (code ?? "<unresolved>");
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="row">
          <div><span class="ix">${ix}</span> → <span class="err">${errLabel}</span></div>
          <div class="meta-sub">${f.signature}</div>
        </div>
        ${f.fee_payer ? `<div class="meta-sub">user: ${f.fee_payer}</div>` : ""}
      `;
      failHost.appendChild(card);
    }
  }

  if (data.upgrade_history) {
    document.getElementById("upgrade-section").style.display = "";
    const h = data.upgrade_history;
    document.getElementById("upgrade").innerHTML = `
      <b>authority:</b> ${h.authority || "&lt;immutable&gt;"}<br>
      ${h.last_deploy_slot != null ? `<b>last slot:</b> ${h.last_deploy_slot.toLocaleString()}<br>` : ""}
      ${h.last_deploy_time != null
        ? `<b>last deploy:</b> ${new Date(h.last_deploy_time * 1000).toISOString()}` : ""}
    `;
  }

  if (data.account_counts && data.account_counts.length > 0) {
    document.getElementById("accounts-section").style.display = "";
    const host = document.getElementById("accounts");
    for (const a of data.account_counts) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${a.name}</td><td class="num">${a.count.toLocaleString()}</td>`;
      host.appendChild(tr);
    }
  }

  // Live-refresh hook — `ratchet observe --ui` exposes `/api/report`.
  // The static export has no server and this block 404s; fetch swallows
  // that and the page stays on its embedded snapshot. In live mode,
  // rebuild the DOM on every successful poll so a tab left open updates
  // itself without a manual reload.
  if (window.location.protocol.startsWith("http")) {
    const poll = async () => {
      try {
        const r = await fetch("/api/report");
        if (!r.ok) return;
        const next = await r.json();
        document.getElementById("report-json").textContent = JSON.stringify(next);
        // Wipe the sections we rebuild; static labels stay put.
        for (const id of ["instructions", "errors", "failures", "upgrade", "accounts"]) {
          const el = document.getElementById(id);
          if (el) el.innerHTML = "";
        }
        document.getElementById("upgrade-section").style.display = "none";
        document.getElementById("accounts-section").style.display = "none";
        location.reload();
      } catch (_) { /* transient — try again next tick */ }
    };
    setInterval(poll, 15_000);
  }
})();
</script>
</body>
</html>
